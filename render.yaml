services:
  - type: web
    name: cocina-soberana
    env: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn cocina_soberana.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cocina-soberana-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.3"

databases:
  - name: cocina-soberana-db
    plan: free
    region: oregon
